<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ToonTalk — WASM</title>
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(1200px 800px at 50% 0%, #23233a, #101018 70%);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px; padding: 16px; box-sizing: border-box;
    font: 14px/1.5 system-ui, -apple-system, Segoe UI, sans-serif; color: #d7d7e4;
  }
  #stage { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  /* 800x600 pixel art scaled up to fill the window, 4:3 preserved. */
  #ttcanvas {
    image-rendering: pixelated; background: #000;
    width: min(92vw, 74vh); height: auto; aspect-ratio: 4 / 3;
    border: 1px solid #3a3a4c; border-radius: 6px;
    box-shadow: 0 10px 50px rgba(0,0,0,.55);
  }
  #help {
    max-width: 620px; text-align: center; color: #a9a9bd;
    background: rgba(255,255,255,.04); border: 1px solid #2c2c3c;
    border-radius: 8px; padding: 10px 16px;
  }
  #help b { color: #ececf4; }
  kbd {
    font: inherit; background: #2a2a3a; border: 1px solid #44445a; border-bottom-width: 2px;
    border-radius: 4px; padding: 0 6px; color: #e6e6f2;
  }
  #status { color: #6d6d80; font-size: 12px; letter-spacing: .02em; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="ttcanvas" width="800" height="600"></canvas>
  <div id="help">
    <b>Welcome to ToonTalk.</b> Click the picture, then <b>press&nbsp;and&nbsp;hold the left mouse
    button</b> to fly Marty's helicopter down and land. <b>Move the mouse</b> to steer and to move
    your hand. Press <kbd>Esc</kbd> to release the mouse.
  </div>
  <div id="status">loading engine…</div>
</div>
<script>
  var statusEl = document.getElementById('status');
  var Module = {
    print: function (t) { console.log(t); },
    printErr: function (t) { console.warn(t); },
    onRuntimeInitialized: function () { statusEl.textContent = 'engine running — click the picture to begin'; }
  };
  window.onerror = function (m) { statusEl.textContent = 'error: ' + m; };
</script>
<script src="tt.js"></script>
</body>
</html>
